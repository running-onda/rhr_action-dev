<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行動指針ビューア</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --ink: #1a2744;
      --ink-secondary: #4a5568;
      --ink-muted: #8d959c;
      --line: #e4e6e8;
      --gold: #c9a227;
      --navy-soft: #eef1f6;
      --navy-highlight: #e4eaf3;
      --sage: #6b9b7a;
      --teal: #4a8f9c;
      --coral: #d4846a;
      --sage-soft: #eef4ef;
      --teal-soft: #e8f2f4;
      --coral-soft: #faf0ec;
      --radius: 6px;
      --space-xs: 6px;
      --space-sm: 12px;
      --space-md: 20px;
      --space-lg: 32px;
      --space-xl: 48px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "DM Sans", "Noto Sans JP", -apple-system, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.65;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px 16px;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .brand-logo {
      height: 32px;
      width: auto;
      display: block;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--ink);
      white-space: nowrap;
      line-height: 1.2;
    }

    .header-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 10px;
      margin-left: auto;
      flex: 1 1 auto;
      min-width: 0;
    }

    .header-toolbar select,
    .header-toolbar input {
      min-width: 0;
    }

    .header-toolbar .save-toast {
      align-self: center;
    }

    .guideline-intro {
      margin: 0 0 var(--space-lg);
      padding: var(--space-md) var(--space-lg);
      font-size: 14px;
      line-height: 1.9;
      color: var(--ink-secondary);
      background: var(--surface);
      border-left: 3px solid var(--ink);
      border-radius: var(--radius);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toolbar-group label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .save-toast {
      font-size: 12px;
      color: var(--sage);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-toast.visible {
      opacity: 1;
    }

    #userName {
      width: 120px;
      padding: 6px 10px;
      font-size: 12px;
    }

    #myGradeSelect,
    #gradeFilter {
      width: 132px;
      padding: 6px 10px;
      font-size: 12px;
    }

    select, input, textarea, button {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 9px 14px;
      font-size: 13px;
      font-family: inherit;
      color: var(--ink);
      min-width: 160px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--teal);
    }

    textarea {
      width: 100%;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-lg) var(--space-lg) var(--space-xl);
    }

    /* —— 大項目ナビ（1行） —— */
    .category-nav {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      margin-bottom: var(--space-lg);
      width: 100%;
    }

    .category-btn {
      flex: 1 1 0;
      min-width: 0;
      cursor: pointer;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-secondary);
      text-align: center;
      line-height: 1.2;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .category-btn:hover {
      border-color: var(--ink-muted);
      color: var(--ink);
    }

    .category-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .category-btn .cat-label {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-btn.active .cat-label {
      opacity: 0.7;
    }

    /* —— セクションヘッダ —— */
    .section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      padding-bottom: 0;
    }

    .section-head h2 {
      margin: 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .section-head .view-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: none;
      color: var(--ink);
      line-height: 1.2;
      margin-top: 4px;
    }

    .count {
      font-size: 12px;
      color: var(--ink-muted);
    }

    /* —— 大項目グループ（すべて表示時） —— */
    .major-section {
      margin-bottom: var(--space-xl);
    }

    .major-section:last-child {
      margin-bottom: 0;
    }

    .major-header {
      display: flex;
      align-items: baseline;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      padding: 14px 0 12px;
      position: sticky;
      top: 0;
      z-index: 6;
      background: var(--bg);
    }

    .major-header .major-name {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--major-color, var(--ink));
      line-height: 1.15;
    }

    .major-header .middle-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink-secondary);
      letter-spacing: 0.02em;
    }

    /* —— 単一大項目表示時のヘッダ —— */
    .single-major-banner {
      margin-bottom: var(--space-lg);
      padding: 14px 0 12px;
      position: sticky;
      top: 0;
      z-index: 6;
      background: var(--bg);
    }

    .single-major-banner .major-name {
      font-size: clamp(30px, 4.5vw, 40px);
      font-weight: 700;
      color: var(--major-color, var(--ink));
      letter-spacing: 0.03em;
      line-height: 1.15;
    }

    .single-major-banner .middle-name {
      font-size: 15px;
      color: var(--ink-secondary);
      margin-top: 6px;
    }

    /* —— 小項目カード —— */
    .items {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .item-identity {
      padding: var(--space-lg) var(--space-lg) var(--space-md);
      border-bottom: 1px solid var(--line);
    }

    .item-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      margin: 0;
    }

    .item-name {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin: 0;
    }

    .concept-tag {
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--major-color, var(--teal));
      background: var(--major-soft, var(--teal-soft));
      padding: 5px 12px;
      border-radius: 4px;
      letter-spacing: 0.1em;
      vertical-align: middle;
      transform: translateY(-2px);
    }

    .item-breadcrumb {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    .item-breadcrumb .tier-major {
      font-weight: 600;
      color: var(--major-color, var(--ink-secondary));
    }

    .item-breadcrumb .sep {
      margin: 0 6px;
      opacity: 0.5;
    }

    .item-breadcrumb .tier-middle {
      color: var(--ink-secondary);
    }

    .item-description {
      padding: var(--space-lg);
      background: linear-gradient(90deg, var(--major-soft, var(--navy-soft)) 0%, var(--surface) 24%);
      border-left: 4px solid var(--major-color, var(--ink));
      border-bottom: 1px solid var(--line);
    }

    .description-text {
      font-size: 16px;
      line-height: 1.85;
      color: var(--ink);
      font-weight: 500;
      margin: 0;
      max-width: 72ch;
    }

    /* —— 昇級ステップ —— */
    .steps {
      display: grid;
      gap: 0;
    }

    .step {
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 140px 120px 1fr;
      gap: var(--space-md);
      align-items: start;
    }

    .step:last-child {
      border-bottom: none;
    }

    .step.highlight {
      background: var(--navy-highlight);
    }

    .step.highlight .grade-name {
      color: var(--ink);
    }

    .grade-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }

    .phase-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--major-color, var(--teal));
      line-height: 1.4;
    }

    .step-body {
      font-size: 14px;
      line-height: 1.75;
      color: var(--ink);
      margin: 0;
    }

    /* —— 評価コメント —— */
    .self-assess {
      padding: 20px 24px 22px;
      background: linear-gradient(160deg, #f4f6fa 0%, #fff 50%, #fafbfc 100%);
      border-top: 1px solid rgba(26, 39, 68, 0.06);
    }

    .eval-block {
      margin-bottom: 16px;
    }

    .eval-block:last-of-type {
      margin-bottom: 0;
    }

    .eval-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .rating-dots-wrap {
      margin-bottom: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .rating-dots {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 4px;
      position: relative;
      min-width: 0;
    }

    .rating-dots::before {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: 6px;
      height: 1px;
      background: var(--line);
      z-index: 0;
    }

    .rating-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .rating-dot .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #c5cad1;
      background: var(--surface);
      transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .rating-dot:hover .dot {
      border-color: var(--major-color, var(--ink));
      transform: scale(1.15);
    }

    .rating-dot.active .dot {
      background: var(--major-color, var(--ink));
      border-color: var(--major-color, var(--ink));
      box-shadow: 0 0 0 3px rgba(26, 39, 68, 0.12);
    }

    .rating-dot .num {
      font-size: 9px;
      line-height: 1;
      color: var(--ink-muted);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .rating-dot.active .num {
      color: var(--major-color, var(--ink));
      font-weight: 700;
    }

    .eval-textarea {
      width: 100%;
      min-height: 88px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.65;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      resize: vertical;
      font-family: inherit;
    }

    .eval-textarea:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(26, 39, 68, 0.08);
      outline: none;
    }

    .supervisors-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .supervisor-block {
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .supervisor-block-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 10px;
    }

    .supervisor-block-head .eval-label {
      margin: 0;
      flex: 1 1 auto;
    }

    .supervisor-name {
      flex: 1 1 160px;
      min-width: 120px;
      max-width: 220px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .btn-remove-supervisor {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink-muted);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      font-family: inherit;
      flex-shrink: 0;
    }

    .btn-remove-supervisor:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .btn-add-supervisor {
      margin-top: 12px;
      border: 1px dashed var(--ink-muted);
      background: transparent;
      color: var(--ink-secondary);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .btn-add-supervisor:hover {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--navy-soft);
    }

    .assess-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .btn-save-item {
      border: none;
      background: var(--ink);
      color: #fff;
      border-radius: 6px;
      padding: 10px 22px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-save-item:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .btn-save-all {
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--ink);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 12px;
      min-width: 0;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-save-all:hover {
      background: rgba(201, 162, 39, 0.12);
    }

    @media (max-width: 900px) {
      .step {
        grid-template-columns: 1fr;
        gap: var(--space-sm);
      }
    }

    .empty {
      padding: var(--space-xl);
      text-align: center;
      color: var(--ink-muted);
      font-size: 14px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    @media (max-width: 900px) {
      .header-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .header-toolbar {
        margin-left: 0;
        justify-content: flex-start;
      }

      #userName, #myGradeSelect, #gradeFilter {
        flex: 1 1 100px;
        width: auto;
        max-width: none;
      }
    }

    @media (max-width: 720px) {
      .header-inner { padding: 10px 14px; }
      main { padding: var(--space-md); }
      .self-assess { padding: 18px 16px; }
    }

    body.is-locked {
      overflow: hidden;
      height: 100%;
    }

    body.is-locked #appContent {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    body.is-locked #authGate {
      position: fixed;
      inset: 0;
      z-index: 10000;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body:not(.is-locked) #authGate {
      display: none;
    }

    .auth-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 32px rgba(26, 39, 68, 0.06);
    }

    .auth-card h2 {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .auth-card p {
      margin: 0 0 20px;
      font-size: 13px;
      color: var(--ink-secondary);
      line-height: 1.6;
    }

    .auth-card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .auth-card input[type="password"] {
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-family: inherit;
      margin-bottom: 12px;
    }

    .auth-card input[type="password"]:focus {
      border-color: var(--ink);
      outline: none;
      box-shadow: 0 0 0 3px rgba(26, 39, 68, 0.08);
    }

    .auth-error {
      min-height: 1.25em;
      font-size: 12px;
      color: #b42318;
      margin-bottom: 8px;
    }

    .auth-submit {
      width: 100%;
      border: none;
      background: var(--ink);
      color: #fff;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .auth-submit:hover {
      opacity: 0.92;
    }

    .btn-logout {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink-secondary);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-logout:hover {
      border-color: var(--ink-muted);
      color: var(--ink);
    }
  </style>
</head>
<body class="is-locked">
  <div id="authGate" class="auth-gate" role="dialog" aria-labelledby="authTitle" aria-modal="true">
    <div class="auth-card">
      <h2 id="authTitle">行動指針ビューア</h2>
      <p>社内利用のため、共有パスワードを入力してください。</p>
      <form id="authForm">
        <label for="authPassword">パスワード</label>
        <input id="authPassword" type="password" autocomplete="current-password" required />
        <p id="authError" class="auth-error" aria-live="polite"></p>
        <button type="submit" class="auth-submit">入室する</button>
      </form>
    </div>
  </div>

  <div id="appContent" hidden inert aria-hidden="true">
  <header>
    <div class="header-inner">
      <div class="brand-block">
        <img class="brand-logo" src="assets/rhr-logo.png" alt="Running Home Run. Inc" />
        <div class="brand-text">
          <h1>行動指針</h1>
        </div>
      </div>
      <div class="header-toolbar toolbar">
        <div class="toolbar-group">
          <label for="userName">氏名</label>
          <input id="userName" type="text" placeholder="名前を入力" autocomplete="name" />
        </div>
        <div class="toolbar-group">
          <label for="myGradeSelect">自分の職級</label>
          <select id="myGradeSelect">
            <option value="">未設定</option>
          </select>
        </div>
        <div class="toolbar-group">
          <label for="gradeFilter">表示する職級</label>
          <select id="gradeFilter">
            <option value="all">全職級を表示</option>
          </select>
        </div>
        <button type="button" class="btn-save-all" id="saveAllBtn">すべて保存</button>
        <button type="button" class="btn-logout" id="logoutBtn">ログアウト</button>
        <span class="save-toast" id="saveToast" aria-live="polite"></span>
      </div>
    </div>

    async function hashPassword(text) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function unlockApp() {
      sessionStorage.setItem(AUTH_SESSION_KEY, "1");
      document.body.classList.remove("is-locked");
      const gate = document.getElementById("authGate");
      gate.hidden = true;
      const app = document.getElementById("appContent");
      app.hidden = false;
      app.removeAttribute("inert");
      app.removeAttribute("aria-hidden");
    }

    function lockApp() {
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      document.body.classList.add("is-locked");
      const gate = document.getElementById("authGate");
      gate.hidden = false;
      const app = document.getElementById("appContent");
      app.hidden = true;
      app.setAttribute("inert", "");
      app.setAttribute("aria-hidden", "true");
      document.getElementById("authPassword").value = "";
      document.getElementById("authError").textContent = "";
      const items = document.getElementById("items");
      if (items) items.innerHTML = "";
    }

    function initAuthGate(onUnlock) {
      const form = document.getElementById("authForm");
      const input = document.getElementById("authPassword");
      const errEl = document.getElementById("authError");

      if (sessionStorage.getItem(AUTH_SESSION_KEY) === "1") {
        unlockApp();
        onUnlock();
        return;
      }

      form.addEventListener("submit", async e => {
        e.preventDefault();
        errEl.textContent = "";
        const hash = await hashPassword(input.value);
        if (hash === ACCESS_PASSWORD_HASH) {
          unlockApp();
          onUnlock();
        } else {
          errEl.textContent = "パスワードが違います。";
          input.select();
        }
      });

      document.getElementById("logoutBtn").addEventListener("click", () => {
        lockApp();
        input.focus();
      });
    }

        description: "自分が本当にやりたいことや惹かれるものを理解し、その欲望を“動力化”できているか。「やりたい」で止まらず、自分を突き動かすエネルギーへ変換できているか。",
        steps: [
          "自分が何に惹かれ、何をやりたいのかを探し始めている。",
          "自分の欲望や興味を、少しずつ行動へ移し始めている。",
          "欲望を“動力化”し、自ら動きながら成果へ繋げられている。",
          "自分の熱や衝動で周囲を巻き込み、チームへエネルギーを与えられている。",
          "自分の欲望や衝動を理解した上で、自分らしい戦い方や勝ち筋を描けている。",
          "熱や衝動を大切にする空気を組織へ浸透させ、挑戦文化を生み出している。",
          "その衝動や熱量が会社を超えて人々へ伝播し、新しい時代の熱源となっている。"
        ]
      },
      {
        category: "快力",
        middle: "エネルギーの源泉",
        item: "一貫力",
        concept: "覚悟",
        description: "自分なりの価値観や美意識に基づいた“生き方”や“世界線”を持ち、周囲や状況に流されず、そのスタンスを“覚悟”を持って貫けているか。",
        steps: [
          "自分なりの価値観や「好き」を少しずつ理解し始めている。",
          "周囲に流されず、自分なりの考えやスタンスを持とうとしている。",
          "自分の価値観や美意識に基づいて判断し、行動へ反映できている。",
          "自分のスタンスや世界線を持ちながら、周囲へも良い影響を与えられている。",
          "自分なりの哲学や勝ち方を持ち、“覚悟”を持ってその道を進めている。",
          "その価値観や思想が組織文化となり、多くの人の判断基準になっている。",
          "生き方や世界観そのものが社会へ影響を与え、一つの文化や哲学として広がっている。"
        ]
      }
    ];

    const categoryGrid = document.getElementById("categoryGrid");
    const itemsEl = document.getElementById("items");
    const titleEl = document.getElementById("currentTitle");
    const countEl = document.getElementById("count");
    const gradeFilter = document.getElementById("gradeFilter");
    const myGradeSelect = document.getElementById("myGradeSelect");
    const userNameInput = document.getElementById("userName");
    const saveAllBtn = document.getElementById("saveAllBtn");
    const saveToast = document.getElementById("saveToast");

    const STORAGE_KEY = "rhr-guideline-self-assessment";
    const USER_NAME_KEY = "rhr-guideline-user-name";
    const MY_GRADE_KEY = "rhr-guideline-my-grade";

    let currentCategory = "all";
    let assessments = loadAssessments();

    function loadAssessments() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveAssessments() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(assessments));
    }

    function itemKey(d) {
      return `${d.category}::${d.item}`;
    }

    function showToast(msg) {
      saveToast.textContent = msg;
      saveToast.classList.add("visible");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => saveToast.classList.remove("visible"), 2200);
    }

    grades.forEach((g, i) => {
      const label = `${g.name}｜${g.phase}`;
      const optView = document.createElement("option");
      optView.value = String(i);
      optView.textContent = label;
      gradeFilter.appendChild(optView);

      const optMine = document.createElement("option");
      optMine.value = String(i);
      optMine.textContent = label;
      myGradeSelect.appendChild(optMine);
    });

    const savedName = localStorage.getItem(USER_NAME_KEY);
    if (savedName) userNameInput.value = savedName;

    const savedMyGrade = localStorage.getItem(MY_GRADE_KEY);
    if (savedMyGrade !== null && savedMyGrade !== "") {
      myGradeSelect.value = savedMyGrade;
    }

    function getMyGradeIndex() {
      const v = myGradeSelect.value;
      return v === "" ? -1 : Number(v);
    }

    const categories = [...new Set(data.map(d => d.category))];

    function themeFor(cat) {
      return categoryTheme[cat] || { color: "#5a6269", soft: "#f0f0ee" };
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderCategories() {
      categoryGrid.innerHTML = "";
      const allBtn = makeCategoryButton("すべて", "", currentCategory === "all", () => {
        currentCategory = "all";
        render();
      });
      categoryGrid.appendChild(allBtn);

      categories.forEach(cat => {
        const middle = data.find(d => d.category === cat)?.middle || "";
        const btn = makeCategoryButton(cat, middle, currentCategory === cat, () => {
          currentCategory = cat;
          render();
        });
        categoryGrid.appendChild(btn);
      });
    }

    function makeCategoryButton(title, sub, active, onClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = `category-btn ${active ? "active" : ""}`;
      btn.innerHTML = sub
        ? `${escapeHtml(title)}<span class="cat-label">${escapeHtml(sub)}</span>`
        : escapeHtml(title);
      btn.addEventListener("click", onClick);
      return btn;
    }

    function groupByCategory(items) {
      const map = new Map();
      categories.forEach(cat => map.set(cat, []));
      items.forEach(d => {
        if (map.has(d.category)) map.get(d.category).push(d);
      });
      return categories
        .filter(cat => map.get(cat).length > 0)
        .map(cat => ({ category: cat, middle: map.get(cat)[0].middle, items: map.get(cat) }));
    }

    function render() {
      renderCategories();

      let filtered = data.filter(d => currentCategory === "all" || d.category === currentCategory);

      titleEl.textContent = currentCategory === "all" ? "すべて" : currentCategory;
      countEl.textContent = `${filtered.length} 小項目`;

      if (!filtered.length) {
        itemsEl.innerHTML = `<div class="empty">該当する項目がありません。</div>`;
        return;
      }

      if (currentCategory === "all") {
        const groups = groupByCategory(filtered);
        itemsEl.innerHTML = groups.map(g => renderMajorSection(g)).join("");
      } else {
        const middle = filtered[0]?.middle || "";
        const theme = themeFor(currentCategory);
        itemsEl.innerHTML = `
          <div class="single-major-banner" style="--major-color: ${theme.color}">
            <div class="major-name">${escapeHtml(currentCategory)}</div>
            <div class="middle-name">${escapeHtml(middle)}</div>
          </div>
          <div class="items">${filtered.map(d => renderItem(d, true)).join("")}</div>
        `;
      }
    }

    function renderMajorSection(group) {
      const theme = themeFor(group.category);
      return `
        <section class="major-section" style="--major-color: ${theme.color}; --major-soft: ${theme.soft}">
          <header class="major-header">
            <span class="major-name">${escapeHtml(group.category)}</span>
            <span class="middle-name">${escapeHtml(group.middle)}</span>
          </header>
          <div class="items">
            ${group.items.map(d => renderItem(d, false)).join("")}
          </div>
        </section>
      `;
    }

    function renderItem(d, showBreadcrumb) {
      const theme = themeFor(d.category);
      const selectedGrade = gradeFilter.value;
      const stepIndexes = selectedGrade === "all" ? grades.map((_, i) => i) : [Number(selectedGrade)];

      const breadcrumb = showBreadcrumb
        ? `<div class="item-breadcrumb" style="--major-color: ${theme.color}">
            <span class="tier-major">${escapeHtml(d.category)}</span>
            <span class="sep">/</span>
            <span class="tier-middle">${escapeHtml(d.middle)}</span>
          </div>`
        : "";

      return `
        <article class="item-card" style="--major-color: ${theme.color}; --major-soft: ${theme.soft}">
          <div class="item-identity">
            <h3 class="item-title-row">
              <span class="item-name">${escapeHtml(d.item)}</span>
              <span class="concept-tag">${escapeHtml(d.concept)}</span>
            </h3>
            ${breadcrumb}
          </div>
          <div class="item-description">
            <p class="description-text">${escapeHtml(d.description)}</p>
          </div>
          <div class="steps">
            ${stepIndexes.map(i => renderStep(i, d.steps[i], theme)).join("")}
          </div>
          ${renderSelfAssess(itemKey(d), assessments[itemKey(d)] || {})}
        </article>
      `;
    }

    function renderRatingDots(rating) {
      return Array.from({ length: 10 }, (_, n) => {
        const v = n + 1;
        const active = rating === v ? " active" : "";
        return `<button type="button" class="rating-dot${active}" data-rating="${v}" aria-label="${v}点">
          <span class="dot"></span>
          <span class="num">${v}</span>
        </button>`;
      }).join("");
    }

    function normalizeSupervisors(saved) {
      if (Array.isArray(saved.supervisors) && saved.supervisors.length) {
        return saved.supervisors.map(s => ({
          name: s.name || "",
          rating: s.rating || 0,
          comment: s.comment || ""
        }));
      }
      return [{ name: "", rating: 0, comment: "" }];
    }

    function renderSupervisorBlock(sup, index) {
      const canRemove = index > 0;
      return `
        <div class="supervisor-block" data-supervisor-index="${index}">
          <div class="supervisor-block-head">
            <span class="eval-label">上司評価・コメント</span>
            <input type="text" class="supervisor-name" placeholder="上司の名前" value="${escapeHtml(sup.name)}" />
            ${canRemove ? `<button type="button" class="btn-remove-supervisor" aria-label="この上司を削除">×</button>` : ""}
          </div>
          <div class="rating-dots-wrap">
            <div class="rating-dots">${renderRatingDots(sup.rating || 0)}</div>
          </div>
          <textarea class="eval-textarea supervisor-comment" placeholder="評価の理由・コメントを記入">${escapeHtml(sup.comment)}</textarea>
        </div>
      `;
    }

    function renderSelfAssess(key, saved) {
      const selfRating = saved.selfRating ?? saved.rating ?? 0;
      const selfComment = saved.selfComment ?? saved.comment ?? "";
      const supervisors = normalizeSupervisors(saved);

      return `
        <div class="self-assess" data-assess-key="${escapeHtml(key)}">
          <div class="eval-block eval-self">
            <label class="eval-label">本人評価・コメント</label>
            <div class="rating-dots-wrap">
              <div class="rating-dots">${renderRatingDots(selfRating)}</div>
            </div>
            <textarea class="eval-textarea self-comment" placeholder="評価の理由・コメントを記入">${escapeHtml(selfComment)}</textarea>
          </div>
          <div class="supervisors-list">
            ${supervisors.map((sup, i) => renderSupervisorBlock(sup, i)).join("")}
          </div>
          <button type="button" class="btn-add-supervisor">＋ 上司を追加</button>
          <div class="assess-actions">
            <button type="button" class="btn-save-item assess-save">保存する</button>
          </div>
        </div>
      `;
    }

    function readRatingFromDots(dotsEl) {
      const active = dotsEl?.querySelector(".rating-dot.active");
      return active ? Number(active.dataset.rating) : 0;
    }

    function readAssessFromBlock(block) {
      return {
        selfRating: readRatingFromDots(block.querySelector(".eval-self .rating-dots")),
        selfComment: block.querySelector(".self-comment")?.value.trim() || "",
        supervisors: [...block.querySelectorAll(".supervisor-block")].map(el => ({
          name: el.querySelector(".supervisor-name")?.value.trim() || "",
          rating: readRatingFromDots(el.querySelector(".rating-dots")),
          comment: el.querySelector(".supervisor-comment")?.value.trim() || ""
        }))
      };
    }

    function renderStep(i, text, theme) {
      const g = grades[i];
      const isMine = getMyGradeIndex() === i;
      return `
        <section class="step ${isMine ? "highlight" : ""}" style="--major-color: ${theme.color}; --major-soft: ${theme.soft}">
          <div>
            <div class="grade-name">${escapeHtml(g.name)}</div>
          </div>
          <div>
            <div class="phase-name">${escapeHtml(g.phase)}</div>
          </div>
          <div>
            <p class="step-body">${escapeHtml(text)}</p>
          </div>
        </section>
      `;
    }

    function bindAssessmentEvents() {
      itemsEl.querySelectorAll(".self-assess[data-assess-key]").forEach(block => {
        const key = block.dataset.assessKey;

        block.querySelector(".assess-save")?.addEventListener("click", () => {
          saveItemAssessment(key, block);
        });

        block.querySelectorAll(".rating-dots").forEach(dotsEl => {
          dotsEl.querySelectorAll(".rating-dot").forEach(btn => {
            btn.addEventListener("click", () => {
              const v = Number(btn.dataset.rating);
              dotsEl.querySelectorAll(".rating-dot").forEach(b => {
                b.classList.toggle("active", Number(b.dataset.rating) === v);
              });
            });
          });
        });

        block.querySelector(".btn-add-supervisor")?.addEventListener("click", () => {
          const current = readAssessFromBlock(block);
          assessments[key] = { ...(assessments[key] || {}), ...current };
          assessments[key].supervisors.push({ name: "", rating: 0, comment: "" });
          saveAssessments();
          renderAndBind();
        });

        block.querySelectorAll(".btn-remove-supervisor").forEach(btn => {
          btn.addEventListener("click", () => {
            const row = btn.closest(".supervisor-block");
            const idx = Number(row?.dataset.supervisorIndex);
            const current = readAssessFromBlock(block);
            if (current.supervisors.length <= 1) return;
            current.supervisors.splice(idx, 1);
            assessments[key] = { ...(assessments[key] || {}), ...current };
            saveAssessments();
            renderAndBind();
          });
        });
      });
    }

    function saveItemAssessment(key, block) {
      const name = userNameInput.value.trim();
      if (name) localStorage.setItem(USER_NAME_KEY, name);
      const data = readAssessFromBlock(block);
      assessments[key] = {
        ...data,
        userName: name,
        myGrade: myGradeSelect.value,
        updatedAt: new Date().toISOString()
      };
      saveAssessments();
      showToast("保存しました");
    }

    function saveAllAssessments() {
      itemsEl.querySelectorAll(".self-assess[data-assess-key]").forEach(block => {
        saveItemAssessment(block.dataset.assessKey, block);
      });
      showToast("すべて保存しました");
    }

    function renderAndBind() {
      render();
      bindAssessmentEvents();
    }

    gradeFilter.addEventListener("change", renderAndBind);
    myGradeSelect.addEventListener("change", () => {
      localStorage.setItem(MY_GRADE_KEY, myGradeSelect.value);
      renderAndBind();
    });
    userNameInput.addEventListener("change", () => {
      localStorage.setItem(USER_NAME_KEY, userNameInput.value.trim());
    });
    saveAllBtn.addEventListener("click", () => {
      localStorage.setItem(USER_NAME_KEY, userNameInput.value.trim());
      saveAllAssessments();
    });

    initAuthGate(() => renderAndBind());
  </script>
</body>
</html>
